name: Link Check and Accessibility

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  link-check:
    runs-on: ubuntu-latest
    name: Check Links
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Check internal links
        run: bundle exec rake test
        continue-on-error: true

  accessibility:
    runs-on: ubuntu-latest
    name: Accessibility Tests
    needs: link-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl '/agentic-comparison'

      - name: Start Jekyll server (background)
        run: |
          bundle exec jekyll serve --baseurl '/agentic-comparison' --detach
          sleep 5

      - name: Run accessibility tests
        run: npm run test:a11y
        continue-on-error: true

      - name: Upload screenshots (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: a11y-screenshots
          path: ./a11y-screenshots/
          retention-days: 5

  color-contrast:
    runs-on: ubuntu-latest
    name: Color Contrast Check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install color contrast checker
        run: npm install -g color-contrast-checker

      - name: Check SCSS variables for contrast
        run: |
          echo "Checking color contrast in SCSS variables..."
          # Extract colors from SCSS and check contrast
          grep -E "\$.*color.*:" _sass/_brutalist.scss | head -20
          echo "Note: Manual verification required for color contrast"
