<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

{%- include head.html -%}

<body class="comparison-page">
  {%- include navigation.html -%}

  <main class="page-content" aria-label="Content">
    <!-- Page Header -->
    <section class="page-header py-5 bg-light">
      <div class="container">
        <div class="row">
          <div class="col-lg-8">
            <h1 class="display-5">{{ page.title }}</h1>
            {% if page.description %}
              <p class="lead text-muted">{{ page.description }}</p>
            {% endif %}
          </div>
        </div>
      </div>
    </section>

    <!-- Controls Section -->
    <section class="comparison-controls py-3 border-bottom sticky-top bg-white" style="top: 56px; z-index: 1020;">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-4 mb-2 mb-md-0">
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control" id="comparison-search" placeholder="Search...">
            </div>
          </div>
          <div class="col-md-8">
            <div class="d-flex flex-wrap gap-2 justify-content-md-end">
              <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                  <i class="bi bi-funnel"></i> Filter Tools
                </button>
                <ul class="dropdown-menu" id="tool-filter">
                  <!-- Tool checkboxes generated by JS -->
                </ul>
              </div>
              <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                  <i class="bi bi-grid"></i> Categories
                </button>
                <ul class="dropdown-menu" id="category-filter">
                  <!-- Categories generated by JS -->
                </ul>
              </div>
              <button class="btn btn-outline-secondary" id="reset-filters">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Comparison Content -->
    <div class="container py-4">
      {{ content }}
    </div>
  </main>

  {%- include footer.html -%}

  <!-- Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

  <!-- jQuery (required for DataTables) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
  
  <!-- Custom scripts -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/comparison.js' | relative_url }}"></script>
  
  {% if page.custom_js %}
    {% for js_file in page.custom_js %}
      <script src="{{ js_file | relative_url }}"></script>
    {% endfor %}
  {% endif %}
</body>

</html>
