{% assign faqs = include.faqs %} {% assign page_url = page.url | absolute_url %}
{% comment %} FAQPage schema for terminology and commands pages Expects faqs to
be an array of { question, answer } objects {% endcomment %}

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "@id": "{{ page_url }}#faq",
    "mainEntity": [
      {% for faq in faqs %}
      {
        "@type": "Question",
        "name": "{{ faq.question | escape }}",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "{{ faq.answer | escape }}"
        }
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  }
</script>
