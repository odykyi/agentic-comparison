# Aider Tool Definition
# Reference: https://github.com/Aider-AI/aider

name: "Aider"
slug: "aider"
repo: "Aider-AI/aider"
website: "https://aider.chat"
docs: "https://aider.chat/docs"
command_prefix: "aider"
description: "AI pair programming in your terminal. Aider lets you pair program with LLMs to edit code in your local git repository."

version:
  current: "0.65.0"
  last_verified: "2024-01-15"
  verified_by: "@community"

license: "Apache-2.0"
language: "Python"

concepts:
  skill: "not supported"
  command: "command"
  agent: "assistant"
  prompt: "message"
  context: "conversation"

install:
  pip: "pip install aider-chat"
  other: "Requires Python 3.8-3.12"

features:
  mcp_support: false
  offline_mode: false
  ide_integration: []
  context_window: 200000
  supported_models:
    - "gpt-4"
    - "gpt-4-turbo"
    - "claude-3-opus"
    - "claude-3-sonnet"
    - "claude-3-haiku"

pricing:
  free_tier:
    available: true
    limits: "Bring your own API keys"
  paid_tiers: []

commands:
  - name: "help"
    invoke: "aider --help"
    description: "Show help"
    category: "general"
    verified: true
  - name: "start"
    invoke: "aider"
    description: "Start aider in current directory"
    category: "general"
    verified: true
  - name: "commit"
    invoke: "/commit"
    description: "Commit changes"
    category: "git"
    verified: true
  - name: "add"
    invoke: "/add <file>"
    description: "Add file to context"
    category: "file"
    verified: true
  - name: "drop"
    invoke: "/drop <file>"
    description: "Remove file from context"
    category: "file"
    verified: true
  - name: "undo"
    invoke: "/undo"
    description: "Undo last git commit"
    category: "git"
    verified: true
  - name: "ls"
    invoke: "/ls"
    description: "List files in context"
    category: "file"
    verified: true
  - name: "run"
    invoke: "/run <command>"
    description: "Run shell command"
    category: "general"
    verified: true
  - name: "test"
    invoke: "/test"
    description: "Run test command"
    category: "test"
    verified: true

# Aider uses .aider.chat.history.md for history
history_file: ".aider.chat.history.md"
