# Continue.dev Tool Definition
# Reference: https://github.com/continuedev/continue

name: "Continue.dev"
slug: "continue"
repo: "continuedev/continue"
website: "https://continue.dev"
docs: "https://docs.continue.dev"
command_prefix: "continue"
description: "An open-source AI code assistant for VS Code, JetBrains, and Neovim. Features multi-provider support allowing you to use any model."

version:
  current: "0.0.56"
  last_verified: "2024-01-15"
  verified_by: "@community"

license: "Apache-2.0"
language: "TypeScript"

concepts:
  skill: "context provider"
  command: "slash command"
  agent: "assistant"
  prompt: "prompt"
  context: "context"

install:
  other: "Install from VS Code marketplace, JetBrains plugins, or neovim package manager"

features:
  mcp_support: false
  offline_mode: true
  ide_integration: ["vscode", "jetbrains", "neovim"]
  context_window: 128000
  supported_models:
    - "gpt-4"
    - "gpt-4-turbo"
    - "claude-3-opus"
    - "claude-3-sonnet"
    - "claude-3-haiku"
    - "llama2"
    - "codellama"
    - "ollama"

pricing:
  free_tier:
    available: true
    limits: "Open source - bring your own API keys"
  paid_tiers:
    - name: "Continue for Teams"
      price: "Custom"
      description: "Team collaboration features"

commands:
  - name: "edit"
    invoke: "/edit"
    description: "Edit selected code"
    category: "edit"
    verified: true
  - name: "comment"
    invoke: "/comment"
    description: "Add comments to code"
    category: "edit"
    verified: true
  - name: "share"
    invoke: "/share"
    description: "Share conversation"
    category: "general"
    verified: true
  - name: "cmd"
    invoke: "/cmd"
    description: "Generate terminal command"
    category: "general"
    verified: true
  - name: "commit"
    invoke: "/commit"
    description: "Generate commit message"
    category: "git"
    verified: true
  - name: "test"
    invoke: "/test"
    description: "Generate tests"
    category: "test"
    verified: true

# Continue uses its own configuration system
config_file: "config.json"
config_format: "JSON with context providers"
