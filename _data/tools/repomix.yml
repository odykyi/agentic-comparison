# Repomix Tool Definition
# Reference: https://github.com/yamadashy/repomix

name: "Repomix"
slug: "repomix"
repo: "yamadashy/repomix"
website: "https://repomix.com"
docs: "https://github.com/yamadashy/repomix#readme"
command_prefix: "repomix"
description: "📦 A powerful tool that packs your entire repository into a single, AI-friendly file. Perfect for feeding your codebase to LLMs like Claude, ChatGPT, DeepSeek, Perplexity, Gemini, and more."

version:
  current: "0.40.0"
  last_verified: "2024-04-17"
  verified_by: "@community"

license: "MIT"
language: "TypeScript"

concepts:
  skill: "not supported"
  command: "CLI command"
  agent: "not applicable"
  prompt: "not applicable"
  context: "packed codebase"

install:
  npm: "npm install -g repomix"
  yarn: "yarn global add repomix"
  bun: "bun add -g repomix"
  homebrew: "brew install repomix"
  npx: "npx repomix@latest"
  docker: "docker run -v .:/app -it --rm ghcr.io/yamadashy/repomix"

features:
  mcp_support: true
  offline_mode: true
  ide_integration: ["vscode", "browser_extension"]
  context_window: not_applicable
  supported_models:
    - "claude"
    - "chatgpt"
    - "deepseek"
    - "perplexity"
    - "gemini"
    - "gemma"
    - "llama"
    - "grok"
    - "any LLM"

pricing:
  free_tier:
    available: true
    limits: "Completely free and open source"
  paid_tiers: []

commands:
  - name: "pack"
    invoke: "repomix"
    description: "Pack current repository into AI-friendly format"
    category: "general"
    verified: true
  - name: "pack-directory"
    invoke: "repomix path/to/directory"
    description: "Pack specific directory"
    category: "general"
    verified: true
  - name: "remote"
    invoke: "repomix --remote user/repo"
    description: "Pack a remote GitHub repository"
    category: "general"
    verified: true
  - name: "include"
    invoke: "repomix --include 'src/**/*.ts'"
    description: "Include specific files with glob patterns"
    category: "file-selection"
    verified: true
  - name: "ignore"
    invoke: "repomix --ignore '*.test.js'"
    description: "Ignore specific files/patterns"
    category: "file-selection"
    verified: true
  - name: "style-xml"
    invoke: "repomix --style xml"
    description: "Output in XML format (default)"
    category: "output"
    verified: true
  - name: "style-markdown"
    invoke: "repomix --style markdown"
    description: "Output in Markdown format"
    category: "output"
    verified: true
  - name: "style-json"
    invoke: "repomix --style json"
    description: "Output in JSON format"
    category: "output"
    verified: true
  - name: "compress"
    invoke: "repomix --compress"
    description: "Compress output using Tree-sitter (extract key code elements)"
    category: "output"
    verified: true
  - name: "init"
    invoke: "repomix --init"
    description: "Initialize repomix.config.json"
    category: "config"
    verified: true
  - name: "mcp"
    invoke: "repomix --mcp"
    description: "Run as MCP server for AI tool integration"
    category: "integration"
    verified: true
  - name: "token-count"
    invoke: "repomix --token-count-tree"
    description: "Show token count tree of repository"
    category: "analysis"
    verified: true
  - name: "git-logs"
    invoke: "repomix --include-logs"
    description: "Include git commit history"
    category: "git"
    verified: true

config_file: "repomix.config.json"
config_format: "JSON"
