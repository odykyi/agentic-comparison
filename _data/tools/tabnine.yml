# Tabnine Tool Definition
# Reference: https://www.tabnine.com

name: "Tabnine"
slug: "tabnine"
repo: "codota/TabNine"
website: "https://www.tabnine.com"
docs: "https://docs.tabnine.com"
command_prefix: "tabnine"
description: "AI code completion tool that works in every IDE. Predicts and suggests code completions in real-time, helping you code faster with fewer errors. Supports whole-line, full-function, and natural language to code completions."

version:
  current: "4.0.0"
  last_verified: "2024-01-15"
  verified_by: "@community"

license: "Proprietary"
language: "Python/C++"

concepts:
  skill: "completion"
  command: "suggestion"
  agent: "assistant"
  prompt: "query"
  context: "context"

install:
  ide: "Install from IDE plugin marketplace (VS Code, IntelliJ, etc.)"
  other: "Works in 30+ IDEs including VS Code, JetBrains, Vim, Emacs, Sublime"

features:
  mcp_support: false
  offline_mode: true
  ide_integration:
    - "vscode"
    - "intellij"
    - "pycharm"
    - "webstorm"
    - "vim"
    - "neovim"
    - "sublime"
    - "atom"
    - "eclipse"
    - "visualstudio"
  context_window: 0
  supported_models:
    - "tabnine-model"
    - "gpt-4"
    - "claude-3.5-sonnet"

pricing:
  free_tier:
    available: true
    limits: "Short code completions only"
  paid_tiers:
    - name: "Pro"
      price: "$12/month"
      description: "Whole-line, full-function, and natural language completions"
    - name: "Enterprise"
      price: "Contact sales"
      description: "Self-hosted option, private AI models, SSO"

commands:
  - name: "accept"
    invoke: "Tab"
    description: "Accept completion suggestion"
    category: "general"
    verified: true
  - name: "next"
    invoke: "Alt+]"
    description: "Next completion suggestion"
    category: "general"
    verified: true
  - name: "prev"
    invoke: "Alt+["
    description: "Previous completion suggestion"
    category: "general"
    verified: true
  - name: "chat"
    invoke: "Ctrl+Shift+Space"
    description: "Open Tabnine Chat (Pro feature)"
    category: "general"
    verified: true

history_file: ".tabnine"
