# OpenCode Tool Definition
# Reference: https://github.com/saoirse-opencode/opencode

name: "OpenCode"
slug: "opencode"
repo: "saoirse-opencode/opencode"
website: "https://opencode.ai"
docs: "https://docs.opencode.ai"
command_prefix: "opencode"
description: "An intelligent CLI tool that provides a unified interface to AI coding agents with support for skills, commands, and MCP integration."

version:
  current: "1.0.0"
  last_verified: "2024-01-15"
  verified_by: "@community"

license: "MIT"
language: "TypeScript"

concepts:
  skill: "agent"
  command: "slash command"
  agent: "agent"
  prompt: "prompt"
  context: "context"

install:
  npm: "npm install -g @opencode/cli"
  homebrew: "brew install opencode"
  curl: "curl -fsSL https://opencode.ai/install.sh | bash"

features:
  mcp_support: true
  offline_mode: false
  ide_integration: ["vscode", "jetbrains"]
  context_window: 128000
  supported_models:
    - "gpt-4"
    - "gpt-4-turbo"
    - "claude-3-opus"
    - "claude-3-sonnet"

pricing:
  free_tier:
    available: true
    limits: "100 requests/day with local models, API keys required for cloud models"
  paid_tiers:
    - name: "Pro"
      price: "$19/month"
      description: "Unlimited requests, priority support"

commands:
  - name: "help"
    invoke: "opencode help"
    description: "Show help information"
    category: "general"
    verified: true

  - name: "init"
    invoke: "opencode init"
    description: "Initialize a new project"
    category: "general"
    verified: true

  - name: "chat"
    invoke: "opencode chat"
    description: "Start an interactive chat session"
    category: "general"
    verified: true

  - name: "edit"
    invoke: "opencode edit <file>"
    description: "Edit a file with AI assistance"
    category: "file"
    verified: true

  - name: "explain"
    invoke: "opencode explain <file>"
    description: "Explain code in a file"
    category: "file"
    verified: true

  - name: "commit"
    invoke: "opencode commit"
    description: "Generate a commit message"
    category: "git"
    verified: true

  - name: "review"
    invoke: "opencode review"
    description: "Review code changes"
    category: "git"
    verified: true

  - name: "test"
    invoke: "opencode test"
    description: "Generate and run tests"
    category: "test"
    verified: true

  - name: "fix"
    invoke: "opencode fix"
    description: "Fix errors in code"
    category: "debug"
    verified: true

  - name: "search"
    invoke: "opencode search <query>"
    description: "Search across the codebase"
    category: "search"
    verified: true

  - name: "refactor"
    invoke: "opencode refactor <file>"
    description: "Refactor code in a file"
    category: "edit"
    verified: true

mcp_servers:
  - name: "filesystem"
    supported: true
    setup_required: false
  - name: "github"
    supported: true
    setup_required: true
  - name: "fetch"
    supported: true
    setup_required: false
