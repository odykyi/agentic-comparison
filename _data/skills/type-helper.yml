# Type Annotation Helper
# AI-powered TypeScript/JavaScript type annotation generator

name: "Type Annotation Helper"
slug: "type-helper"
description: "Automatically adds TypeScript types and JSDoc annotations to JavaScript code. Improves type safety and IDE support."
category: "code-quality"
tags:
  - typescript
  - types
  - jsdoc
  - javascript
  - typing

compatible_tools:
  - codex
  - claude_code
  - opencode
  - aider

install_commands:
  codex: "codex skills install type-helper"
  claude_code: "claude skills install type-helper"
  opencode: "opencode skills install type-helper"
  aider: "aider --skill type-helper"

usage_example: |
  # Add types to current file
  /types

  # Convert to TypeScript
  /types --convert

