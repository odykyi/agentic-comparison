# Documentation Generator
# AI-powered documentation generation skill

name: "Documentation Generator"
slug: "doc-gen"
description: "Generates comprehensive documentation from code comments, type definitions, and function signatures. Supports JSDoc, TypeDoc, and custom formats."
category: "documentation"
tags:
  - documentation
  - docs
  - jsdoc
  - typedoc
  - readme

compatible_tools:
  - codex
  - claude_code
  - opencode
  - aider

install_commands:
  codex: "codex skills install doc-gen"
  claude_code: "claude skills install doc-gen"
  opencode: "opencode skills install doc-gen"
  aider: "aider --skill doc-gen"

usage_example: |
  # Generate docs for current project
  /docs

  # Generate README for specific module
  /docs --target=src/utils

