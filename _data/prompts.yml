# Prompt Templates for Skills Marketplace
# These templates are used when opening skills in external tools

# Codex prompt template
# Variables available: skill_name, skill_slug, marketplace_url, install_command, source_url
codex_install: 'Install skill "{{ skill_name }}" from Agentic Comparison ({{ marketplace_url }}). Run: {{ install_command }} | Source: {{ source_url }}'

